<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#213C51" />
    <meta name="description" content="Piano practice session logger" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="music.log" />

    <!-- Apple touch icons — iOS ignores manifest.json for home screen icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png" />

    <!-- iOS splash screens (optional but prevents white flash) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Standard PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="shortcut icon" href="/favicon.png" />

    <title>music.log</title>

    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #EAF0F5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
